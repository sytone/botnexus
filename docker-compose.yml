services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: botnexus:dev
    container_name: botnexus-gateway
    ports:
      - "5000:5000"
    volumes:
      # Mount your local ~/.botnexus directory as the gateway config.
      # Override BOTNEXUS_CONFIG_DIR to point to a different directory.
      - ${BOTNEXUS_CONFIG_DIR:-~/.botnexus}:/app/config:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Uncomment and set these if not using auth.json:
      # GITHUB_TOKEN: ${GITHUB_TOKEN}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
