name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    permissions:
      contents: write   # required to push version bump commits and tags
      packages: write   # required to publish packages
      id-token: write   # enable GitHub OIDC token issuance for NuGet login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TYPE="${{ github.event.inputs.release_type }}"

          # Get latest semantic tag like v1.2.3
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)

          if [[ -z "$LATEST_TAG" ]]; then
            BASE_VERSION="0.0.0"
          else
            BASE_VERSION="${LATEST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$RELEASE_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Invalid release_type: $RELEASE_TYPE" >&2
              exit 1
              ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"

          echo "Latest tag: ${LATEST_TAG:-<none>}"
          echo "Base version: $BASE_VERSION"
          echo "Next version: $VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Bump version in Directory.Build.props
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" Directory.Build.props
          sed -i "s|<InformationalVersion>.*</InformationalVersion>|<InformationalVersion>${VERSION}</InformationalVersion>|" Directory.Build.props
          echo "Bumped version to ${VERSION}"
          grep "<Version>" Directory.Build.props

      - name: Generate CHANGELOG.md (full history)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Generate full changelog with all versions
          git-cliff --tag "$TAG" --output CHANGELOG.md
          echo "Generated CHANGELOG.md"

      - name: Generate per-release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          DATE=$(date -u +"%Y-%m-%d")

          # Determine commit range for this release
          if [[ -z "$PREV_TAG" ]]; then
            RANGE=""
            echo "No previous tag — using full history for release notes"
          else
            RANGE="${PREV_TAG}..HEAD"
            echo "Release notes from ${PREV_TAG} to HEAD"
          fi

          # Generate release notes markdown via git-cliff
          if [[ -z "$RANGE" ]]; then
            git-cliff --tag "$TAG" --unreleased --strip header > /tmp/release-body.md
          else
            git-cliff "$RANGE" --tag "$TAG" --strip header > /tmp/release-body.md
          fi

          # Create versioned docs page
          RELEASE_PAGE_DIR="docs/releases/${TAG}"
          mkdir -p "$RELEASE_PAGE_DIR"

          {
            echo "---"
            echo "title: \"Release ${TAG}\""
            echo "description: \"Release notes for BotNexus ${TAG}\""
            echo "date: \"${DATE}\""
            echo "---"
            echo ""
            echo "# Release ${TAG}"
            echo ""
            echo "> **Released:** ${DATE}"
            if [[ -n "$PREV_TAG" ]]; then
              echo ">"
              echo "> **Full diff:** [${PREV_TAG}...${TAG}](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG})"
            fi
            echo ""
            cat /tmp/release-body.md
          } > "${RELEASE_PAGE_DIR}/index.md"

          echo "Created ${RELEASE_PAGE_DIR}/index.md"

          # Store release notes for GitHub Release body
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-body.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update releases index page
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"

          # Build list of all release directories (newest first)
          RELEASE_ENTRIES=""
          while IFS= read -r -d '' dir; do
            ver=$(basename "$dir")
            date_line=$(grep '^date:' "${dir}/index.md" 2>/dev/null | head -1 | sed 's/date: *"\?\([^"]*\)"\?/\1/' || true)
            if [[ -z "$RELEASE_ENTRIES" ]]; then
              RELEASE_ENTRIES="| **[${ver}](${ver}/)** | ${date_line} | ← Latest |"
            else
              RELEASE_ENTRIES="${RELEASE_ENTRIES}
| [${ver}](${ver}/) | ${date_line} | |"
            fi
          done < <(find docs/releases -maxdepth 1 -mindepth 1 -type d -name 'v*' -print0 | sort -rVz)

          if [[ -z "$RELEASE_ENTRIES" ]]; then
            TABLE="> No releases yet. Release pages will appear here after the first tagged release is published."
          else
            TABLE="| Version | Date | |
|---------|------|---|
${RELEASE_ENTRIES}"
          fi

          cat > docs/releases/index.md << MDEOF
---
title: Releases
description: BotNexus version history and release notes
---

# Releases

Browse the full version history of BotNexus. Each release page includes the full changelog for that version.

${TABLE}
MDEOF

          echo "Updated docs/releases/index.md"

      - name: Commit release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          git add Directory.Build.props CHANGELOG.md docs/releases/
          git diff --staged --quiet || git commit -m "chore(release): bump version to ${VERSION} [skip ci]"

      - name: Tag release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" -m "Release $TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Build and pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          dotnet pack src/gateway/BotNexus.Cli \
            -c Release \
            --nologo \
            -p:Version=${VERSION} \
            -p:SourceRevisionId=${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: src/gateway/BotNexus.Cli/bin/Release/*.nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          dotnet nuget push src/gateway/BotNexus.Cli/bin/Release/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
