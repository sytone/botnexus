name: Provider Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/agent/BotNexus.Agent.Providers.*/**'
      - 'tests/integration/BotNexus.Integration.ProviderTests/**'
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  github-models:
    name: GitHub Models Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/integration/BotNexus.Integration.ProviderTests/BotNexus.Integration.ProviderTests.csproj

      - name: Build
        run: dotnet build tests/integration/BotNexus.Integration.ProviderTests/BotNexus.Integration.ProviderTests.csproj --no-restore

      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          dotnet test tests/integration/BotNexus.Integration.ProviderTests/BotNexus.Integration.ProviderTests.csproj \
            --no-build \
            --logger "trx;LogFileName=results.trx" \
            --filter "Category=ProviderIntegration&Provider=github-models"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provider-integration-results
          path: '**/results.trx'
