name: Container Integration Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-smoke:
    name: Container smoke test (no LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t botnexus:test .

      - name: Prepare container config directory
        run: |
          mkdir -p /tmp/botnexus-ci
          cp tests/container/config.json /tmp/botnexus-ci/config.json

      - name: Start gateway container
        run: |
          docker run -d --name botnexus-gateway \
            -p 5000:5000 \
            -v /tmp/botnexus-ci:/app/config:ro \
            -e ASPNETCORE_ENVIRONMENT=Development \
            botnexus:test

      - name: Wait for gateway to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health; then
              echo "Gateway ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "Gateway did not become ready in time"
          docker logs botnexus-gateway
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build integration test runner
        run: dotnet build tests/BotNexus.Integration.Tests/BotNexus.Integration.Tests.csproj --nologo --tl:off

      - name: Run smoke scenarios against container
        run: |
          dotnet run --project tests/BotNexus.Integration.Tests --no-build -- \
            --gateway-url=http://localhost:5000 \
            --scenario-dir=tests/container/scenarios

      - name: Collect gateway logs on failure
        if: failure()
        run: docker logs botnexus-gateway

      - name: Stop gateway container
        if: always()
        run: |
          docker stop botnexus-gateway || true
          docker rm botnexus-gateway || true

  container-scenarios:
    name: Container integration scenarios (LLM)
    runs-on: ubuntu-latest
    # Only run when provider secrets are available (skipped on forks and dependabot PRs).
    if: |
      vars.CONTAINER_INTEGRATION_ENABLED == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t botnexus:test .

      - name: Prepare container config directory
        run: |
          mkdir -p /tmp/botnexus-ci
          cp tests/container/config.json /tmp/botnexus-ci/config.json

      - name: Start gateway container with provider credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run -d --name botnexus-gateway \
            -p 5000:5000 \
            -v /tmp/botnexus-ci:/app/config:ro \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            botnexus:test

      - name: Wait for gateway to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health; then
              echo "Gateway ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "Gateway did not become ready in time"
          docker logs botnexus-gateway
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build integration test runner
        run: dotnet build tests/BotNexus.Integration.Tests/BotNexus.Integration.Tests.csproj --nologo --tl:off

      - name: Run full scenario suite against container
        run: |
          dotnet run --project tests/BotNexus.Integration.Tests --no-build -- \
            --gateway-url=http://localhost:5000

      - name: Collect gateway logs on failure
        if: failure()
        run: docker logs botnexus-gateway

      - name: Stop gateway container
        if: always()
        run: |
          docker stop botnexus-gateway || true
          docker rm botnexus-gateway || true
