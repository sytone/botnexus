name: "CI: Build & Test"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'

# Redundant CI: on a PR that pushes several commits in quick succession, cancel the
# superseded in-flight run so the latest commit wins instead of stacking builds.
# Push runs on main are grouped per ref but not cancelled. See issue #1548.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # PRs: run only tests affected by the change (fast feedback)
  impacted-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools and packages
        run: |
          dotnet tool restore
          dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test (impacted only)
        shell: pwsh
        run: ./scripts/repo/test-impacted.ps1 -From origin/${{ github.base_ref }} -NoBuild

  # Push to main: full test suite with coverage (safety net)
  full-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        # Excludes tests that require external infrastructure not present in CI:
        # - BotNexus.Integration.*  : CLI pack/install integration tests (not unit tests)
        # - BotNexus.Conversation.* : live-gateway SignalR tests (all SkippableFact; gateway not running)
        # - BotNexus.E2E.*          : Playwright end-to-end tests (browsers not installed)
        run: dotnet test --no-build --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~BotNexus.Integration.&FullyQualifiedName!~BotNexus.Conversation.Tests.&FullyQualifiedName!~BotNexus.E2E.Tests."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
