name: "CI: Build & Test"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'

permissions:
  contents: read

jobs:
  # PRs: run only tests affected by the change (fast feedback)
  impacted-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools and packages
        run: |
          dotnet tool restore
          dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test (impacted only)
        shell: pwsh
        run: ./scripts/repo/test-impacted.ps1 -From origin/${{ github.base_ref }} -NoBuild

  # Push to main: full test suite with coverage (safety net)
  full-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~BotNexus.Integration."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
