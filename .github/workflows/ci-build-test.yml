name: "CI: Build & Test"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/deploy-docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
      - 'agents/**'

# Redundant CI: on a PR that pushes several commits in quick succession, cancel the
# superseded in-flight run so the latest commit wins instead of stacking builds.
# Push runs on main are grouped per ref but not cancelled. See issue #1548.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # PRs: run only tests affected by the change (fast feedback)
  impacted-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools and packages
        run: |
          dotnet tool restore
          dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test (impacted only)
        shell: pwsh
        run: ./scripts/repo/test-impacted.ps1 -From origin/${{ github.base_ref }} -NoBuild

  # Push to main: full test suite with coverage (safety net)
  full-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        # Excludes tests that require external infrastructure not present in CI:
        # - BotNexus.Integration.*  : CLI pack/install integration tests (not unit tests)
        # - BotNexus.Conversation.* : live-gateway SignalR tests (all SkippableFact; gateway not running)
        # - BotNexus.E2E.*          : Playwright end-to-end tests (browsers not installed)
        run: dotnet test --no-build --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~BotNexus.Integration.&FullyQualifiedName!~BotNexus.Conversation.Tests.&FullyQualifiedName!~BotNexus.E2E.Tests."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # e2e portal Playwright suites (issue #1962).
  #
  # The existing Playwright tests never ran in CI: the full-tests job excludes the
  # BotNexus.Integration. filter and installs no browser. This job installs chromium
  # and runs the new tests/e2e/ portal suites so that coverage stops being decorative.
  #
  # NON-BLOCKING BY DESIGN: continue-on-error is true so a failure here can NEVER break
  # the required checks for other PRs. Without a live portal (E2E_PORTAL_*_URL unset)
  # the SkippableFact tests skip cleanly rather than fail. Promote to a required check
  # only once a portal harness is stood up here and the suite is proven stable.
  e2e-portal-playwright:
    name: e2e portal (Playwright, non-blocking)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build e2e portal projects
        run: |
          dotnet build tests/e2e/BotNexus.E2E.PortalDesktop.Tests/BotNexus.E2E.PortalDesktop.Tests.csproj --no-restore
          dotnet build tests/e2e/BotNexus.E2E.PortalMobile.Tests/BotNexus.E2E.PortalMobile.Tests.csproj --no-restore
      # Install browser system libraries explicitly. Playwright's `--with-deps`
      # apt list still references `libasound2`, which on Ubuntu 24.04 (noble) is a
      # virtual package renamed to `libasound2t64` by the 64-bit time_t transition,
      # so `--with-deps` fails with "Package 'libasound2' has no installation
      # candidate" (exit 100). We install the deps ourselves against the renamed
      # package and then install the chromium binary without `--with-deps`.
      - name: Install Playwright system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libpango-1.0-0 libcairo2 libatspi2.0-0t64
      - name: Install Playwright browsers (chromium)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ps1 = Get-ChildItem -Recurse -Filter playwright.ps1 -Path tests/e2e | Select-Object -First 1
          if ($null -eq $ps1) { throw 'playwright.ps1 not found after build' }
          & $ps1.FullName install chromium
      - name: Run e2e portal Playwright suites
        # Target the two e2e project files explicitly. A bare `dotnet test --filter`
        # resolves the whole solution and attempts to run every test DLL in the repo;
        # the non-e2e assemblies reject the filter with "argument ... is invalid" and
        # the aggregate run exits 1 even though the e2e suites themselves skip cleanly.
        run: |
          dotnet test tests/e2e/BotNexus.E2E.PortalDesktop.Tests/BotNexus.E2E.PortalDesktop.Tests.csproj --no-build
          dotnet test tests/e2e/BotNexus.E2E.PortalMobile.Tests/BotNexus.E2E.PortalMobile.Tests.csproj --no-build
