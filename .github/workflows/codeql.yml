name: CodeQL

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'agents/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
      - '.squad/**'
      - '.ai-team/**'
      - '.copilot/**'
      - 'agents/**'
      - 'mkdocs.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'cliff.toml'
      - '.editorconfig'
      - '.gitattributes'
  schedule:
    # Weekly scan — safety net for transitive vulnerabilities
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (.NET)
        if: matrix.language == 'csharp'
        run: dotnet build BotNexus.slnx --nologo --tl:off
        env:
          USERPROFILE: /tmp/botnexus-build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
