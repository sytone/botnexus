<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BotNexus">
  <rect width="32" height="32" rx="6" fill="#16213e"/>
  <!-- antenna -->
  <line x1="16" y1="6" x2="16" y2="9" stroke="#4f46e5" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="16" cy="5.4" r="1.3" fill="#6ee7ff"/>
  <!-- head -->
  <rect x="8.5" y="9" width="15" height="12" rx="3" fill="#e6ecff"/>
  <!-- ear pods -->
  <circle cx="8.5" cy="15" r="1.4" fill="#4f46e5"/>
  <circle cx="23.5" cy="15" r="1.4" fill="#4f46e5"/>
  <!-- eyes -->
  <circle cx="13" cy="14.5" r="2" fill="#0d1428"/>
  <circle cx="13" cy="14.5" r="1.05" fill="#6ee7ff"/>
  <circle cx="19" cy="14.5" r="2" fill="#0d1428"/>
  <circle cx="19" cy="14.5" r="1.05" fill="#6ee7ff"/>
  <!-- mouth grille -->
  <rect x="12.5" y="17.6" width="7" height="1.6" rx="0.8" fill="#4f46e5"/>
  <!-- body -->
  <rect x="10.5" y="22.5" width="11" height="5" rx="1.6" fill="#4f46e5"/>
  <circle cx="16" cy="25" r="1.1" fill="#6ee7ff"/>
</svg>
