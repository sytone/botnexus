<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BotNexus" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>BotNexus</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Loading BotNexus...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">X</span>
    </div>
    <script src="js/errorReporting.js"></script>
    <script src="js/marked.min.js"></script>
    <script src="js/purify.min.js"></script>
    <script src="js/markdown.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/splitter.js"></script>
    <script src="js/canvasBridge.js"></script>
    <script>
        // Clipboard helper for copy-to-clipboard via JS interop
        window.BotNexus = window.BotNexus || {};
        window.BotNexus.copyToClipboard = function (text) {
            if (navigator.clipboard) {
                return navigator.clipboard.writeText(text).then(function () { return true; }, function () { return false; });
            }
            return Promise.resolve(false);
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
